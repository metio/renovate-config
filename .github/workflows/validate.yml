name: Validate Renovate config
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: lts/*
      # default.json is a preset, not a standard Renovate config filename, so the validator cannot
      # auto-discover it — pass it explicitly. --strict fails on warnings, not just hard errors.
      - name: Validate preset
        run: npx --yes --package renovate -- renovate-config-validator --strict default.json
